<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="webmention" href="https://snowcoach-production.up.railway.app/webmention" />
    <title>SnowCoach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/webmention.css">
    <link rel="icon" type="image/png" href="./images/logo.png">
</head>

<body>
    <header>
        <h1><a href="../index.html">Snow<span>Coach</span></a></h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="./stappenplan.html">Stappenplan</a>
            <a href="./oefeningen.html">Oefeningen</a>

        </nav>
    </header>
    <section class="top-section">
        <h1>Webmentions beheer</h1>
    </section>


    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Source</th>
                    <th>Target</th>
                    <th>Datum</th>
                    <th>Status</th>
                    <th>Acties</th>
                </tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
        <button onclick="test()">Test webmention</button>
    </div>

    <script>
        async function loadMentions() {
            try {
                const res = await fetch('/api/webmentions');

                if (!res.ok) {
                    throw new Error("API error: " + res.status);
                }

                const mentions = await res.json();

                const rows = mentions.map(m => `
            <tr>
                <td>${m.site}</td>
                <td><a href="${m.source}" target="_blank">${m.source}</a></td>
                <td><a href="${m.target}" target="_blank">${m.target}</a></td>
                <td>${new Date(m.timestamp).toLocaleDateString("nl-BE")}</td>
                <td>${m.goedgekeurd ? "✅" : "⏳"}</td>
                <td>
                    ${!m.goedgekeurd ? `<button onclick="keur(${m.id})">Goedkeuren</button>` : ""}
                    <button onclick="verwijder(${m.id})">Verwijderen</button>
                </td>
            </tr>
        `).join("");

                document.getElementById("tabel-body").innerHTML =
                    rows || "<tr><td colspan='6'>Geen webmentions</td></tr>";

            } catch (err) {
                console.error(err);
                document.getElementById("tabel-body").innerHTML =
                    "<tr><td colspan='6'>Fout bij laden</td></tr>";
            }
        }

        async function keur(id) {
            await fetch('/admin/webmentions/' + id + '/goedkeuren', { method: 'POST' });
            loadMentions();
        }

        async function verwijder(id) {
            if (!confirm('Verwijderen?')) return;
            await fetch('/admin/webmentions/' + id, { method: 'DELETE' });
            loadMentions();
        }

        loadMentions();
        async function test() {
            const BASE_URL = "https://snowcoach-production.up.railway.app";
            const res = await fetch('/webmention', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `source=https://example.com/test&target=${BASE_URL}/html/oefening.html?id=remediering-3`
            });
            console.log(await res.text());
            loadMentions();
        }
    </script>

</body>

</html>
